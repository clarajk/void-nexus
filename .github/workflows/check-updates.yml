name: Check All Updates

on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:

concurrency:
  group: check-updates-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_OPTIONS: "--no-warnings"

permissions:
  contents: write
  actions: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests packaging

      - name: Phase 1 - Scan APIs & Update Versions
        id: scan
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        run: |
          python3 << 'EOF'
          import os, re, requests, subprocess, hashlib, datetime, tempfile, urllib.parse
          from packaging import version as pkg_version
          from packaging.version import InvalidVersion
          from pathlib import Path

          SITE_VARS = {
              '${GNOME_SITE}':        'https://download.gnome.org/sources',
              '$GNOME_SITE':          'https://download.gnome.org/sources',
              '${KDE_SITE}':          'https://download.kde.org/stable',
              '$KDE_SITE':            'https://download.kde.org/stable',
              '${PYPI_SITE}':         'https://files.pythonhosted.org/packages/source',
              '$PYPI_SITE':           'https://files.pythonhosted.org/packages/source',
              '${GNU_SITE}':          'https://ftp.gnu.org/gnu',
              '$GNU_SITE':            'https://ftp.gnu.org/gnu',
              '${XFCE_SITE}':         'https://archive.xfce.org/src',
              '$XFCE_SITE':           'https://archive.xfce.org/src',
              '${SOURCEFORGE_SITE}':  'https://downloads.sourceforge.net',
              '$SOURCEFORGE_SITE':    'https://downloads.sourceforge.net',
              '${MOZILLA_SITE}':      'https://releases.mozilla.org/pub',
              '$MOZILLA_SITE':        'https://releases.mozilla.org/pub',
              '${NONGNU_SITE}':       'https://download.savannah.nongnu.org/releases',
              '$NONGNU_SITE':         'https://download.savannah.nongnu.org/releases',
              '${KERNEL_SITE}':       'https://www.kernel.org/pub',
              '$KERNEL_SITE':         'https://www.kernel.org/pub',
              '${CPAN_SITE}':         'https://cpan.metacpan.org/modules/by-module',
              '$CPAN_SITE':           'https://cpan.metacpan.org/modules/by-module',
              '${FREEDESKTOP_SITE}':  'https://freedesktop.org/software',
              '$FREEDESKTOP_SITE':    'https://freedesktop.org/software',
              '${DEBIAN_SITE}':       'https://ftp.debian.org/debian/pool',
              '$DEBIAN_SITE':         'https://ftp.debian.org/debian/pool',
          }

          def resolve_site_vars(url):
              for var, repl in SITE_VARS.items(): url = url.replace(var, repl)
              return url

          def fetch_file(url, dest_path):
              try:
                  proc = subprocess.run(['curl', '-sSL', '-A', 'VoidNexus-BuildBot/1.0', '-o', dest_path, url], timeout=120)
                  return proc.returncode == 0
              except Exception as e:
                  print(f"Error fetching {url}: {e}")
                  return False

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, 'rb') as f:
                  for chunk in iter(lambda: f.read(65536), b''): h.update(chunk)
              return h.hexdigest()

          def get_latest_commit(repo_url):
              try:
                  out = subprocess.check_output(['git', 'ls-remote', repo_url, 'HEAD'], timeout=30, stderr=subprocess.DEVNULL).decode()
                  m = re.search(r'([a-f0-9]{40})', out)
                  if m: return m.group(1), datetime.datetime.now(datetime.timezone.utc).strftime('%Y%m%d')
              except Exception: pass
              return None, None

          def normalize_version_tag(tag):
              tag = str(tag or '').strip()
          
              # Handles:
              #   v1.2.3
              #   rust-v1.2.3
              #   codex-v1.2.3
              #   release-1.2.3
              m = re.search(r'(\d+(?:\.\d+)+(?:[._+-]?(?:alpha|beta|rc|pre)?\d*)?)', tag, re.I)
              if m:
                  return m.group(1)
          
              return tag.lstrip('v')
          
          
          def get_latest_github_release(owner, repo, gh_headers):
              try:
                  resp = requests.get(
                      f'https://api.github.com/repos/{owner}/{repo}/releases/latest',
                      headers=gh_headers,
                      timeout=20
                  ).json()
                  return normalize_version_tag(resp.get('tag_name', ''))
              except Exception:
                  pass
              return None

          def get_latest_gitlab_tag(host, project_path):
              try:
                  encoded = urllib.parse.quote(project_path, safe='')
                  url = f"https://{host}/api/v4/projects/{encoded}/repository/tags"
                  resp = requests.get(url, timeout=20)
                  resp.raise_for_status()
                  tags = resp.json()
                  if not isinstance(tags, list):
                      return None
                  versions = []
                  for tag in tags:
                      if not isinstance(tag, dict):
                          continue
                      name = tag.get('name', '')
                      match = re.search(r'(\d+\.\d+(?:\.\d+)*)', name)
                      if not match:
                          continue
                      ver_str = match.group(1)
                      try:
                          pkg_version.parse(ver_str)
                          versions.append(ver_str)
                      except InvalidVersion:
                          continue
                  if not versions:
                      return None
                  versions.sort(key=pkg_version.parse, reverse=True)
                  return versions[0]
              except Exception:
                  return None

          def get_pypi_latest(pkgname):
              try:
                  names = [pkgname, pkgname[8:] if pkgname.startswith('python3-') else pkgname, pkgname[7:] if pkgname.startswith('python-') else pkgname]
                  for name in names:
                      resp = requests.get(f'https://pypi.org/pypi/{name}/json', timeout=15)
                      if resp.status_code == 200: return resp.json()['info']['version']
              except Exception: pass
              return None

          def is_date_version(ver): return bool(re.match(r'^\d{8}$', str(ver)))
          def is_semver(ver): return '.' in str(ver)

          def version_is_newer(latest, current):
              if not latest or latest == current: return False
              if is_date_version(current) and is_semver(latest): return True
              try: return pkg_version.parse(str(latest)) > pkg_version.parse(str(current))
              except Exception: return latest != current

          def resolve_url(url_template, pkgname, ver, sha, curr_ver=None, curr_sha=None, template_vars=None):
              url = resolve_site_vars(url_template)
              url = url.replace('${pkgname}', pkgname).replace('$pkgname', pkgname)
              use_ver = ver if ver else curr_ver
              if use_ver is not None:
                  use_ver = str(use_ver)
                  url = url.replace('${version}', use_ver).replace('$version', use_ver)
                  if '.' in use_ver:
                      short_ver = '.'.join(use_ver.split('.')[:-1])
                      url = url.replace('${version%.*}', short_ver)
              use_sha = sha if sha else curr_sha
              if use_sha is not None:
                  use_sha = str(use_sha)
                  url = url.replace('${_commit}', use_sha).replace('$_commit', use_sha)
              for arch_var in ['${_upstream_arch}', '${_arch}', '$XBPS_TARGET_MACHINE', '${XBPS_TARGET_MACHINE}', '${_machine}']:
                  url = url.replace(arch_var, 'x86_64')
              url = url.replace('${_deb_arch}', 'amd64').replace('$_deb_arch', 'amd64')
              if template_vars:
                  for var, val in template_vars.items():
                      url = url.replace('${' + var + '}', str(val)).replace('$' + var, str(val))
              url = re.sub(r'\$\{?[A-Za-z_][A-Za-z0-9_]*\}?', '', url)
              return url

          def extract_template_vars(content):
              vars_ = {}
              for m in re.finditer(r'^_([A-Za-z0-9_]+)=["\']?([A-Za-z0-9._-]+)["\']?', content, re.MULTILINE):
                  vars_[m.group(1)] = m.group(2)
                  vars_['_' + m.group(1)] = m.group(2)
              return vars_

          def extract_shell_var(var_name, content):
              pattern = rf'^{var_name}=(?:(".*?")|(\'.*?\')|\[(.*?)\]|(\S+))'
              m = re.search(pattern, content, re.MULTILINE | re.DOTALL)
              if not m: return None
              return m.group(1) or m.group(2) or m.group(3) or m.group(4)

          def extract_distfile_urls(content):
              m = re.search(r'^distfiles=(.+?)(?=\n[A-Za-z#_]|\Z)', content, re.MULTILINE | re.DOTALL)
              if not m: return []
              return re.findall(r'(https?://[^\s"\'>\\]+)', m.group(1))

          def replace_checksums(content, new_hashes):
              if not new_hashes: return content
              clean = []
              for h in new_hashes:
                  s = str(h).translate(str.maketrans('', '', '[]\'"')).strip()
                  if s:
                      clean.append(s)
              if not clean: return content
              for s in clean:
                  assert re.fullmatch(r'[a-f0-9]{64}', s), f"Bad checksum will not be written: {s!r}"
              if len(clean) == 1:
                  repl = f"checksum={clean[0]}"
              else:
                  joined = '\n '.join(clean)
                  repl = f'checksum="{joined}"'
              content = re.sub(r'^_?checksum=.*(?:\n[ \t]+.*)*\n?', '', content, flags=re.MULTILINE)
              content = re.sub(r'^(distfiles=.*(?:\n[ \t]+.*)*)', r'\1\n' + repl, content, flags=re.MULTILINE)
              return content

          def extract_appimage_version(appimage_path):
              try:
                  subprocess.run(['chmod', '+x', appimage_path], check=True)
                  result = subprocess.run([appimage_path, '--appimage-version'], capture_output=True, text=True, timeout=30)
                  if result.returncode == 0 and result.stdout.strip():
                      return result.stdout.strip()
              except Exception:
                  pass
              try:
                  with tempfile.TemporaryDirectory() as tmpdir:
                      subprocess.run([appimage_path, '--appimage-extract'], cwd=tmpdir, capture_output=True, timeout=120)
                      extracted_dir = Path(tmpdir) / 'squashfs-root'
                      if extracted_dir.is_dir():
                          for desktop_file in extracted_dir.glob('*.desktop'):
                              content = desktop_file.read_text(encoding='utf-8', errors='ignore')
                              match = re.search(r'^X-AppImage-Version=(.+)', content, re.MULTILINE)
                              if match:
                                  return match.group(1).strip()
                              match = re.search(r'^Version=(.+)', content, re.MULTILINE)
                              if match:
                                  return match.group(1).strip()
              except Exception:
                  pass
              return None

          def get_arch_checksum(template_content, arch):
              pattern = rf'{arch}.*?\n.*?checksum=([a-f0-9]+)'
              match = re.search(pattern, template_content, re.DOTALL)
              return match.group(1) if match else None

          git_user = "github-actions[bot]"
          subprocess.run(['git', 'config', 'user.name', git_user], check=True)
          subprocess.run(['git', 'config', 'user.email', f'{git_user}@users.noreply.github.com'], check=True)
          branch = os.environ.get('GITHUB_REF_NAME', 'main')
          subprocess.run(['git', 'checkout', '-B', branch], check=True)

          templates = sorted(
              p for p in Path(".").glob("**/template")
              if ".git" not in p.parts
              and ".github" not in p.parts
          )
          print(f"Found {len(templates)} templates")

          changed_packages = []
          gh_token = os.environ.get('GITHUB_TOKEN')
          gh_headers = {
              'Accept': 'application/vnd.github.v3+json',
              **(({'Authorization': f'token {gh_token}'}) if gh_token else {})
          }

          for tpath in templates:
              raw = tpath.read_text(encoding='utf-8')
              pkg_m = re.search(r'pkgname=["\']?([^"\'\s\n]+)', raw)
              ver_m = re.search(r'\bversion=["\']?([^"\'\n\s]+)', raw)
              if not pkg_m or not ver_m: continue
              pkgname, curr_ver = pkg_m.group(1), ver_m.group(1)
              commit_m = re.search(r'_commit=["\']?([a-fA-F0-9]{7,40})', raw)
              curr_sha = commit_m.group(1) if commit_m else None
              tmpl_vars = extract_template_vars(raw)
              print(f"Scanning {pkgname}...")
              new_ver, new_sha = None, None

              if pkgname == "rootapp":
                  print("  → Fetching rootapp AppImages...")
                  x64_url = "https://installer.rootapp.com/installer/Linux/X64/Root.AppImage"
                  arm64_url = "https://installer.rootapp.com/installer/Linux/Arm64/Root.AppImage"
                  with tempfile.TemporaryDirectory() as tmpdir:
                      x64_path = os.path.join(tmpdir, "Root_x64.AppImage")
                      arm64_path = os.path.join(tmpdir, "Root_arm64.AppImage")
                      if fetch_file(x64_url, x64_path) and fetch_file(arm64_url, arm64_path):
                          new_ver = extract_appimage_version(x64_path)
                          if not new_ver:
                              print("  → ERROR: Could not extract version from AppImage")
                              continue
                          new_checksum_x64 = sha256_file(x64_path)
                          new_checksum_arm64 = sha256_file(arm64_path)
                          curr_checksum_x64 = get_arch_checksum(raw, 'x86_64')
                          curr_checksum_arm64 = get_arch_checksum(raw, 'aarch64')
                          print(f"  → Current version: {curr_ver}, New version: {new_ver}")
                          print(f"  → X64 hash changed: {curr_checksum_x64 != new_checksum_x64}")
                          print(f"  → ARM64 hash changed: {curr_checksum_arm64 != new_checksum_arm64}")
                          if version_is_newer(new_ver, curr_ver):
                              candidate = raw
                              candidate = re.sub(r'^version=.*', f'version={new_ver}', candidate, flags=re.MULTILINE)
                              candidate = re.sub(r'^revision=.*', 'revision=1', candidate, flags=re.MULTILINE)
                              if curr_checksum_x64:
                                  candidate = candidate.replace(curr_checksum_x64, new_checksum_x64)
                              if curr_checksum_arm64:
                                  candidate = candidate.replace(curr_checksum_arm64, new_checksum_arm64)
                              tpath.write_text(candidate, encoding='utf-8')
                              changed_packages.append(pkgname)
                              print(f"  → Successfully processed {pkgname}")
                          else:
                              print("  → No version update available for rootapp")
                      else:
                          print("  → ERROR: Failed to download one or both AppImages")
                  continue

              if curr_sha is not None:
                  repo_m = re.search(r'_gitrepo=["\']?([^"\'\n\s]+)', raw)
                  repo_url = repo_m.group(1) if repo_m else None
                  if not repo_url:
                      gh_m = re.search(r'https://github\.com/([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+)', raw)
                      repo_url = f'https://github.com/{gh_m.group(1)}' if gh_m else None
                  if repo_url:
                      found_sha, found_date = get_latest_commit(repo_url)
                      if found_sha and found_sha != curr_sha:
                          new_sha, new_ver = found_sha, found_date
              else:
                  gh_m = re.search(r'https://github\.com/([A-Za-z0-9_.-]+)/([A-Za-z0-9_.-]+)', raw)
                  gl_m = re.search(r'https://(gitlab[A-Za-z0-9_.-]*\.[a-z]+)/([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+)', raw)
                  if gh_m:
                      owner, repo = gh_m.group(1), gh_m.group(2)
                      latest = get_latest_github_release(owner, repo, gh_headers)
                      if version_is_newer(latest, curr_ver): new_ver = latest
                  elif gl_m:
                      host, project_path = gl_m.group(1), gl_m.group(2)
                      latest = get_latest_gitlab_tag(host, project_path)
                      if version_is_newer(latest, curr_ver): new_ver = latest
                  if new_ver is None and ('PYPI_SITE' in raw or pkgname.startswith('python')):
                      pypi_latest = get_pypi_latest(pkgname)
                      if pypi_latest and version_is_newer(pypi_latest, curr_ver): new_ver = pypi_latest

              if isinstance(new_ver, list):
                  print(f"ERROR: {pkgname} received a list instead of string. Skipping.")
                  continue
              if isinstance(new_sha, list):
                  print(f"ERROR: {pkgname} received a list instead of string for SHA. Skipping.")
                  continue

              curr_checksum_val = extract_shell_var(r'_?checksum', raw)
              is_corrupted = False
              if curr_checksum_val and re.search(r'[\[\],]', curr_checksum_val):
                  is_corrupted = True
              if not new_ver and not new_sha and not is_corrupted:
                  continue

              candidate = raw
              if new_sha: candidate = re.sub(r'(_commit=["\']?)[a-fA-F0-9]+', lambda m: f"{m.group(1)}{new_sha}", candidate)
              if new_ver: candidate = re.sub(r'(\bversion=["\']?)[^\n\s"\']+', lambda m: f"{m.group(1)}{new_ver}", candidate)

              urls = extract_distfile_urls(candidate)
              if not urls: continue

              resolved_urls = []
              for url in urls:
                  r = resolve_url(url, pkgname, ver=new_ver, sha=new_sha, curr_ver=curr_ver, curr_sha=curr_sha, template_vars=tmpl_vars)
                  if r is None:
                      resolved_urls = None
                      break
                  resolved_urls.append(r)
              if resolved_urls is None: continue

              new_checksums = []
              fetch_ok = True
              for url in resolved_urls:
                  with tempfile.NamedTemporaryFile(delete=False, suffix='.dl') as tmp: tmp_path = tmp.name
                  if fetch_file(url, tmp_path):
                      new_checksums.append(sha256_file(tmp_path))
                      os.unlink(tmp_path)
                  else:
                      try: os.unlink(tmp_path)
                      except OSError: pass
                      fetch_ok = False
                      break
              if not fetch_ok:
                  print(f"Failed to fetch distfiles for {pkgname}. Skipping.")
                  continue

              candidate_with_hashes = replace_checksums(candidate, new_checksums)
              if candidate_with_hashes == raw:
                  continue

              if new_ver or new_sha:
                  candidate_final = re.sub(r'(\brevision=["\']?)\d+', r'\g<1>1', candidate_with_hashes)
              else:
                  def bump_rev(m): return m.group(1) + str(int(m.group(2)) + 1)
                  candidate_final = re.sub(r'(\brevision=["\']?)(\d+)', bump_rev, candidate_with_hashes)

              tpath.write_text(candidate_final, encoding='utf-8')
              changed_packages.append(pkgname)
              print(f"Successfully processed {pkgname}")

          print(f"Changed packages: {changed_packages}")
          print(f"updates_found={'true' if changed_packages else 'false'}")

          if changed_packages:
              Path('changed_packages.txt').write_text('\n'.join(changed_packages) + '\n')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"updates_found={'true' if changed_packages else 'false'}\n")
          EOF

      - name: Phase 2 - Commit and Push Updates
        if: steps.scan.outputs.updates_found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -u
          if ! git diff --cached --quiet; then
            git commit -m "auto-update: template refresh $(date -u '+%Y-%m-%d')"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes staged. Skipping commit."
          fi

      - name: Phase 3 - Trigger Relay Race
        if: steps.scan.outputs.updates_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          if [ ! -f changed_packages.txt ]; then
            echo "Relay race skipped: No packages changed."
            exit 0
          fi
          WORKFLOW_NAME="build.yml"
          CHANGED=$(cat changed_packages.txt)
          ORDERED=()
          while IFS= read -r pkg; do
            [ -z "$pkg" ] && continue
            ORDERED+=("$pkg")
          done < changed_packages.txt
          LIST="${ORDERED[*]}"
          echo "Starting relay race with: $LIST"
          gh workflow run "${WORKFLOW_NAME}" \
            --ref "${{ github.ref_name }}" \
            -f package_list="$LIST" \
            -f force_rebuild=false
