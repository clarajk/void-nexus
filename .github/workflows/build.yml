name: Build and Deploy Custom XBPS

on:
  workflow_dispatch:
    inputs:
      package_list:
        description: "Space-separated list of packages to build"
        required: true
      force_rebuild:
        description: "Force recompile even if binary exists in Release"
        type: boolean
        required: false
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_OPTIONS: "--no-warnings"
  ARCH: "x86_64"
  BOOTSTRAP: "x86_64"
  TEST: "0"

permissions:
  contents: write
  actions: write

jobs:
  prepare-queue:
    name: Prepare package queue
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.queue.outputs.matrix }}
      package_count: ${{ steps.queue.outputs.package_count }}
    steps:
      - name: Create package matrix
        id: queue
        shell: bash
        run: |
          set -euo pipefail

          LIST="${{ github.event.inputs.package_list }}"
          if [ -z "${LIST// }" ]; then
            echo "::error::package_list is empty"
            exit 1
          fi

          # Split on whitespace, drop blanks, dedupe while preserving order.
          matrix=$(printf '%s\n' $LIST \
            | awk 'NF && !seen[$0]++' \
            | jq -R . \
            | jq -cs '{package: .}')

          count=$(jq '.package | length' <<< "$matrix")
          if [ "$count" -eq 0 ]; then
            echo "::error::No packages found in package_list"
            exit 1
          fi

          echo "Prepared queue with $count package(s):"
          jq -r '.package[]' <<< "$matrix"

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "package_count=$count" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.package }}
    needs: prepare-queue
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJson(needs.prepare-queue.outputs.matrix) }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Prepare container
        shell: sh
        run: |
          set -e
          REPO="https://repo-default.voidlinux.org/current"
          xbps-install -S -R "$REPO" -yu xbps || true
          xbps-install -S -R "$REPO" -yu || true
          xbps-install -S -R "$REPO" -y bash curl git grep openssl tar xz shadow sudo base-devel file github-cli zstd jq
          git config --global --add safe.directory '*'

      - name: Configure mold linker
        run: |
          ./xbps-src -y install mold
          ./xbps-src -y install clang
          cat >> etc/conf <<'EOF'
          export RUSTFLAGS="-C linker=clang link-arg=-fuse-ld=mold"
          export LDFLAGS="-fuse-ld=mold"
          export CFLAGS="${CFLAGS:-}"
          export CXXFLAGS="${CXXFLAGS:-}"
          EOF

      - name: Clone void-packages
        run: |
          set -e
          git clone --depth=1 https://github.com/void-linux/void-packages.git .
          ln -s / masterdir
          echo "x86_64" > /.xbps_chroot_init
          echo "XBPS_CHROOT_CMD=ethereal" >> etc/conf
          echo "XBPS_ALLOW_CHROOT_BREAKOUT=yes" >> etc/conf
          echo "XBPS_MAKEJOBS=$(nproc)" >> etc/conf
          rm -f common/hooks/pre-pkg/99-pkglint.sh

      - name: Inject Real-Time Shlibs Hook
        run: |
          mkdir -p common/hooks/post-pkg
          cat << 'HOOK_EOF' > common/hooks/post-pkg/99-shlibs-inject.sh
          hook() {
            local pkg_file="$XBPS_REPOSITORY/${pkgname}-${version}_${revision}.${XBPS_TARGET_MACHINE}.xbps"
            if [ -f "$pkg_file" ]; then
               echo "=> ${pkgname}: Dynamically injecting shlibs from ${pkg_file}..."
               local new_shlibs=$( \
                 (tar xOf "$pkg_file" ./props.plist 2>/dev/null || \
                  tar xOf "$pkg_file" props.plist 2>/dev/null || \
                  zstdcat "$pkg_file" | tar xOf - ./props.plist 2>/dev/null || \
                  zstdcat "$pkg_file" | tar xOf - props.plist 2>/dev/null) \
                 | awk -F'[><]' \
                    '/<key>shlib-provides<\/key>/ { p=1; next } \
                     /<\/array>/ { p=0; next } \
                     p && /<string>/ { print $3 }' \
                 || true \
               )
               for so in $new_shlibs; do
                 echo "$so ${pkgname}-${version}_${revision}" >> $XBPS_DISTDIR/common/shlibs
                 echo "   -> Successfully Injected: $so"
               done
            fi
          }
          HOOK_EOF
          chmod +x common/hooks/post-pkg/99-shlibs-inject.sh

      - name: Checkout custom templates
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
          path: custom-templates-temp

      - name: Inject custom templates
        run: |
          set -e
          find custom-templates-temp -maxdepth 2 -name "template" | while read -r tmpl; do
            pkg_dir=$(dirname "$tmpl")
            pkg_name=$(basename "$pkg_dir")
            [ "$pkg_name" = ".github" ] && continue
            cp -r "$pkg_dir" srcpkgs/
          done

      - name: Restore Repository from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          set -e
          mkdir -p hostdir/binpkgs
          echo "Downloading existing packages from rolling release..."
          gh release download rolling -p "*.xbps" --repo "${{ github.repository }}" --dir hostdir/binpkgs 2>/dev/null || echo "First run or no packages found."
          if ls hostdir/binpkgs/*.xbps 1>/dev/null 2>&1; then
            cd hostdir/binpkgs
            xbps-rindex -a *.xbps || true
            cd ../..
          fi
          echo "repository=$(pwd)/hostdir/binpkgs" >> etc/conf

      - name: Build self-healing shlibs map
        run: |
          set -e
          echo "Generating shlibs map by directly extracting props.plist from binaries..."
          touch common/shlibs
          TMP_SHLIBS=$(mktemp)
          if ls hostdir/binpkgs/*.xbps 1>/dev/null 2>&1; then
            for file in hostdir/binpkgs/*.xbps; do
              [ -e "$file" ] || continue
              fname=$(basename "$file")
              PKGVER=$(echo "$fname" | sed -E 's/\.[^.]+\.xbps$//')
              PLIST=$(tar xOf "$file" "./props.plist" 2>/dev/null || \
                      tar xOf "$file" "props.plist" 2>/dev/null || \
                      zstdcat "$file" | tar xOf - "./props.plist" 2>/dev/null || \
                      zstdcat "$file" | tar xOf - "props.plist" 2>/dev/null || true)
              SHLIBS=$(echo "$PLIST" | \
                       awk -F'[><]' \
                          '/<key>shlib-provides<\/key>/ { p=1; next } \
                           /<\/array>/ { p=0; next } \
                           p && /<string>/ { print $3 }' \
                       || true)
              for so in $SHLIBS; do echo "$so $PKGVER" >> "$TMP_SHLIBS"; done
            done
          fi
          if [ -s "$TMP_SHLIBS" ]; then
            cat common/shlibs "$TMP_SHLIBS" | sort -u > /tmp/merged_shlibs
            mv /tmp/merged_shlibs common/shlibs
            echo "Successfully injected new shlibs! Total entries now: $(wc -l < common/shlibs)"
          fi
          rm -f "$TMP_SHLIBS"

      - name: Check if Binary Already Exists
        id: check_bin
        run: |
          set -e
          TARGET="${{ matrix.package }}"
          TMPL="srcpkgs/$TARGET/template"
          if [ -f "$TMPL" ]; then
            VER=$(grep '^version=' "$TMPL" | head -1 | cut -d= -f2 | tr -d '"')
            REV=$(grep '^revision=' "$TMPL" | head -1 | cut -d= -f2 | tr -d '"')
            EXPECTED_PKG="${TARGET}-${VER}_${REV}.x86_64.xbps"
            echo "expected_pkg=$EXPECTED_PKG" >> "$GITHUB_OUTPUT"
            if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
              echo "Force rebuild enabled; not skipping $EXPECTED_PKG even if it exists."
              echo "skip_build=false" >> "$GITHUB_OUTPUT"
            elif [ -f "hostdir/binpkgs/${EXPECTED_PKG}" ]; then
              echo "Binary ${EXPECTED_PKG} found in release cache. Skipping build."
              echo "skip_build=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip_build=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "::error::Template not found for $TARGET at $TMPL"
            exit 1
          fi

      - name: Build package
        if: steps.check_bin.outputs.skip_build != 'true'
        run: |
          set -e
          ./xbps-src pkg "${{ matrix.package }}"

      - name: Stage package artifacts
        run: |
          set -e
          mkdir -p package-artifact
          EXPECTED="${{ steps.check_bin.outputs.expected_pkg }}"

          if [ -f "hostdir/binpkgs/$EXPECTED" ]; then
            cp "hostdir/binpkgs/$EXPECTED" package-artifact/
          else
            echo "::error::Expected package not found: hostdir/binpkgs/$EXPECTED"
            find hostdir/binpkgs -maxdepth 1 -type f -name '*.xbps' -print || true
            exit 1
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: xbps-${{ matrix.package }}
          path: package-artifact/*.xbps
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish signed repository
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full:latest
      options: --privileged
    defaults:
      run:
        shell: bash
    steps:
      - name: Prepare container
        shell: sh
        run: |
          set -e
          REPO="https://repo-default.voidlinux.org/current"
          xbps-install -S -R "$REPO" -yu xbps || true
          xbps-install -S -R "$REPO" -yu || true
          xbps-install -S -R "$REPO" -y bash curl git grep openssl tar xz file github-cli zstd jq
          git config --global --add safe.directory '*'

      - name: Checkout custom templates
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
          path: custom-templates-temp

      - name: Download built package artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts
          pattern: xbps-*
          merge-multiple: true

      - name: Restore existing release packages
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          set -e
          mkdir -p public/x86_64
          echo "Downloading existing packages from rolling release..."
          gh release download rolling -p "*.xbps" --repo "${{ github.repository }}" --dir public/x86_64 2>/dev/null || echo "First run or no existing packages found."

      - name: Merge newly built packages
        run: |
          set -e
          if ls downloaded-artifacts/*.xbps 1>/dev/null 2>&1; then
            cp -f downloaded-artifacts/*.xbps public/x86_64/
          else
            echo "::error::No package artifacts were downloaded"
            exit 1
          fi
          echo "Repository contents after merge:"
          ls -lh public/x86_64/*.xbps

      - name: Sign, index, and upload repository
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          cd public/x86_64

          if ! ls *.xbps 1>/dev/null 2>&1; then
            echo "::error::No .xbps packages found to publish"
            exit 1
          fi

          echo "Generating fresh RSA signatures for all packages..."
          rm -f *.sig2
          printf '%s\n' '${{ secrets.XBPS_PRIVATE_KEY }}' > /tmp/private.pem
          chmod 600 /tmp/private.pem

          for pkg in *.xbps; do
            xbps-rindex --privkey /tmp/private.pem --sign-pkg "$pkg"
          done

          echo "Generating repodata index..."
          xbps-rindex -f -a *.xbps
          xbps-rindex --privkey /tmp/private.pem --signedby "Void Nexus Build Bot <actions@github.com>" --sign .

          echo "Generating packages.json for the website..."
          echo "[" > packages.json
          first=1
          for pkg in *.xbps; do
            [ -e "$pkg" ] || continue
            if [ "$first" -eq 0 ]; then echo "," >> packages.json; fi
            fname=$(basename "$pkg" .x86_64.xbps)
            version="${fname##*-}"
            name="${fname%-$version}"
            printf '  {"name": "%s", "version": "%s"}' "$name" "$version" >> packages.json
            first=0
          done
          echo -e "\n]" >> packages.json

          gh release view rolling -R "$REPO" 2>/dev/null \
            || gh release create rolling -R "$REPO" \
                 --title "Void Nexus Rolling Binaries" \
                 --notes "Automated XBPS Repository" \
                 --prerelease

          retry_upload() {
            local file="$1"
            local max_retries=3
            for i in $(seq 1 "$max_retries"); do
              if gh release upload rolling -R "$REPO" "$file" --clobber; then
                return 0
              fi
              sleep 5
            done
            echo "::error::Failed to upload $file after $max_retries attempts"
            return 1
          }

          echo "Uploading XBPS repo files to GitHub Release..."
          retry_upload "x86_64-repodata"

          for pkg in *.xbps; do
            retry_upload "$pkg"
          done

          for sig in *.sig2; do
            [ -f "$sig" ] && retry_upload "$sig"
          done

          retry_upload "packages.json"
          rm -f /tmp/private.pem
